<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Status Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown-light.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        }

        .markdown-body {
            background: transparent;
            color: #374151;
            font-size: 0.95rem;
        }

        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        }

        details summary {
            list-style: none;
        }

        details summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="p-8 text-gray-900">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-gray-800">Feature &amp; Roadmap Board</h1>
            <p class="mt-2 text-sm text-gray-600">Planned and requested features, grouped by development status.</p>
        </header>

        <div id="board"></div>
    </div>

    <script>
        marked.setOptions({ gfm: true, breaks: true });

        const STATUS_ORDER = ["Wishlist", "Backlog", "Planned", "In progress", "In review", "Released"];

        const STATUS_STYLE = {
            "Wishlist":    { badge: "bg-purple-100 text-purple-800", border: "border-purple-300", dot: "bg-purple-400" },
            "Backlog":     { badge: "bg-slate-100 text-slate-700",   border: "border-slate-300",  dot: "bg-slate-400"  },
            "Planned":     { badge: "bg-blue-100 text-blue-800",     border: "border-blue-300",   dot: "bg-blue-400"   },
            "In progress": { badge: "bg-amber-100 text-amber-800",   border: "border-amber-300",  dot: "bg-amber-400"  },
            "In review":   { badge: "bg-orange-100 text-orange-800", border: "border-orange-300", dot: "bg-orange-400" },
            "Released":    { badge: "bg-green-100 text-green-800",   border: "border-green-300",  dot: "bg-green-500"  },
        };

        const DEFAULT_STYLE = { badge: "bg-gray-100 text-gray-700", border: "border-gray-300", dot: "bg-gray-400" };

        const issues = JSON.parse(atob('W3sibnVtYmVyIjogNDAsICJ0aXRsZSI6ICJJbnZlcnRlZCBwbGFuIHZpZXciLCAiYm9keSI6ICJBIHZpZXcgd2hlcmUgZW1wbG95ZWVzIGFyZSBsaXN0ZWQgaW4gcm93cy4gVGhlIGZpcnN0IGNvbHVtbiBjb250YWlucyB0aGUgZW1wbG95ZWUncyBuYW1lLCB0aGUgcmVtYWluaW5nIGNvbHVtbnMgY29udGFpbiB0aGUgZGF0ZXMgd2l0aCB0aGUgcmVzcGVjdGl2ZSBzaGlmdHMgZm9yIGVhY2ggcGVyc29uIOKAlCBzaW1pbGFyIHRvIHRoZSBleGlzdGluZyBhdmFpbGFiaWxpdHkgdmlldy4iLCAic3RhdGUiOiAiT1BFTiIsICJtaWxlc3RvbmUiOiB7InRpdGxlIjogIlNjaGljaHRwbGFuLXYyLWJhY2tsb2cifSwgInN0YXR1cyI6ICJXaXNobGlzdCJ9LCB7Im51bWJlciI6IDE4NywgInRpdGxlIjogIkNhbGVuZGFyIEludGVncmF0aW9uIiwgImJvZHkiOiAiRW1wbG95ZWVzIGNhbiBzdWJzY3JpYmUgdG8gdGhlaXIgcGVyc29uYWwgc2hpZnQgc2NoZWR1bGUgdmlhIGEgY2FsZW5kYXIgZmVlZCAoaUNhbCkuIFRoZSBmZWVkIGlzIGF2YWlsYWJsZSBhdCBhIHByaXZhdGUsIHNoYXJlYWJsZSBsaW5rIGFuZCBjYW4gYmUgYWRkZWQgdG8gYW55IGNhbGVuZGFyIGFwcCAoR29vZ2xlIENhbGVuZGFyLCBBcHBsZSBDYWxlbmRhciwgT3V0bG9vaywgZXRjLikuXG5cblRoZSBmZWVkIHNob3dzIHVwY29taW5nIGFzc2lnbm1lbnRzIGFuZCBhdXRvbWF0aWNhbGx5IG1hcmtzIGNhbmNlbGxlZCBvciByZXBsYWNlZCBzaGlmdHMgYXMgY2FuY2VsbGVkIGluIHRoZSBjYWxlbmRhci4gTm8gbWFudWFsIHN5bmNocm9uaXNhdGlvbiBuZWVkZWQg4oCUIHRoZSBjYWxlbmRhciBhbHdheXMgcmVmbGVjdHMgdGhlIGN1cnJlbnQgcGxhbi4iLCAic3RhdGUiOiAiT1BFTiIsICJtaWxlc3RvbmUiOiB7InRpdGxlIjogIlNjaGljaHRwbGFuLXYyLWJhY2tsb2cifSwgInN0YXR1cyI6ICJJbiBwcm9ncmVzcyJ9XQ=='));
        const board  = document.getElementById('board');

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        // Group by status; issues without a known status go into the first matching bucket or "Backlog"
        const grouped = {};
        for (const s of STATUS_ORDER) grouped[s] = [];
        for (const issue of issues) {
            const s = issue.status && (issue.status in grouped) ? issue.status : "Backlog";
            grouped[s].push(issue);
        }

        for (const status of STATUS_ORDER) {
            const statusIssues = grouped[status];
            if (statusIssues.length === 0) continue;

            const style = STATUS_STYLE[status] || DEFAULT_STYLE;

            const section = document.createElement('section');
            section.className = `mb-10`;

            const heading = document.createElement('div');
            heading.className = `flex items-center gap-3 mb-4 pb-2 border-b-2 ${style.border}`;
            heading.innerHTML = `
                <span class="inline-block w-3 h-3 rounded-full ${style.dot}"></span>
                <h2 class="text-lg font-bold text-gray-800">${esc(status)}</h2>
                <span class="ml-auto text-xs text-gray-400">${statusIssues.length} issue${statusIssues.length !== 1 ? 's' : ''}</span>
            `;
            section.appendChild(heading);

            const cards = document.createElement('div');
            cards.className = 'space-y-4';

            statusIssues.forEach((issue) => {
                const card = document.createElement('article');
                card.className = 'bg-white/90 rounded-2xl shadow-md p-6 border border-slate-200';

                const markdown  = issue.body || '_No description provided._';
                const renderedBody = issue.renderedBody
                    ? DOMPurify.sanitize(issue.renderedBody)
                    : DOMPurify.sanitize(marked.parse(markdown));

                card.innerHTML = `
                    <details class="group rounded-xl">
                        <summary class="flex cursor-pointer list-none flex-row items-center justify-between gap-3">
                            <h3 class="text-lg font-semibold text-gray-900">#${issue.number} ${esc(issue.title)}</h3>
                            <span class="text-xs text-slate-500 shrink-0 transition group-open:rotate-180">▼</span>
                        </summary>
                        <div class="mt-4 border-t border-slate-200 pt-4">
                            <div class="markdown-body max-w-none">${renderedBody}</div>
                        </div>
                    </details>
                `;

                card.querySelectorAll('img').forEach((img) => {
                    img.loading  = 'lazy';
                    img.decoding = 'async';
                });

                cards.appendChild(card);
            });

            section.appendChild(cards);
            board.appendChild(section);
        }
    </script>
</body>
</html>
