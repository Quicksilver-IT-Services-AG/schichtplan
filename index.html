        const container = document.getElementById('issues-container');

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        issues.forEach((issue) => {
            const card = document.createElement('article');
            card.className = 'bg-white/90 rounded-2xl shadow-lg p-6 border border-slate-200';

            const milestone = issue.milestone ? issue.milestone.title : 'No milestone';
            const stateClasses = issue.state === 'OPEN'
                ? 'bg-emerald-100 text-emerald-800'
                : 'bg-slate-200 text-slate-700';
            const markdown = issue.body || '_No description provided._';
            const renderedBody = issue.renderedBody
                ? DOMPurify.sanitize(issue.renderedBody)
                : DOMPurify.sanitize(marked.parse(markdown));

            card.innerHTML = `
                <details class="group rounded-xl">
                    <summary class="flex cursor-pointer list-none flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                        <div>
                            <h2 class="text-xl font-semibold text-gray-900">#${issue.number} ${esc(issue.title)}</h2>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-bold ${stateClasses}">
                                ${issue.state}
                            </span>
                            <span class="text-xs text-slate-500 transition group-open:rotate-180">▼</span>
                        </div>
                    </summary>
                    <div class="mt-4 border-t border-slate-200 pt-4">
                        <p class="text-sm text-gray-500 italic mb-4">Milestone: ${esc(milestone)}</p>
                        <div class="markdown-body max-w-none">${renderedBody}</div>
                    </div>
                </details>
            `;

            card.querySelectorAll('img').forEach((image) => {
                image.loading = 'lazy';
                image.decoding = 'async';
            });

            container.appendChild(card);
        });
    </script>
